name: Workout
options:
  bundleIdPrefix: com.lingfengmarskey
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  Workout:
    type: application
    platform: iOS
    attributes:
      SystemCapabilities:
        com.apple.Push:
          enabled: 1
        com.apple.iCloud:
          enabled: 1
    sources:
      - path: Workout
    info:
      path: Workout/Info.plist
      properties:
        CFBundleDisplayName: 减脂计划
        NSPhotoLibraryUsageDescription: 用于选择和保存体型记录照片。
        NSCameraUsageDescription: 用于拍摄正面、侧面和背面体型照片。
        NSMicrophoneUsageDescription: 用于在拍摄体型照片时识别“拍照”语音口令。
        NSSpeechRecognitionUsageDescription: 用于识别“拍照”或“茄子”口令并自动触发相机快门。
        NSHealthShareUsageDescription: 用于在你主动同步时读取当天步数，并填入减脂计划的锻炼记录。
        NSHealthUpdateUsageDescription: 用于在你确认后，将身体记录中的体重保存到健康 App。
        NSFaceIDUsageDescription: 用于解锁减脂计划，保护体型照片和健康记录。
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - remote-notification
        UILaunchStoryboardName: LaunchScreen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lingfengmarskey.workout
        PRODUCT_NAME: Workout
        DEVELOPMENT_TEAM: E393H8D2JP
        CODE_SIGN_ENTITLEMENTS: Workout/Workout.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        # Manual signing via fastlane match. Profiles are installed by running
        # `fastlane match development|appstore` (see docs/CODE-SIGNING.md).
        CODE_SIGN_STYLE: Manual
      configs:
        Debug:
          CODE_SIGN_IDENTITY: Apple Development
          PROVISIONING_PROFILE_SPECIFIER: match Development com.lingfengmarskey.workout
        Release:
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: match AppStore com.lingfengmarskey.workout
  WorkoutTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WorkoutTests
    dependencies:
      - target: Workout
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lingfengmarskey.workout.tests
        GENERATE_INFOPLIST_FILE: true
        # Kept on automatic signing: match does not manage the .tests bundle id,
        # and simulator test runs do not need a signing identity at all.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: E393H8D2JP
schemes:
  Workout:
    build:
      targets:
        Workout: all
        WorkoutTests: [test]
    test:
      gatherCoverageData: false
      targets:
        - WorkoutTests
